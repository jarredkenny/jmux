# jmux tmux configuration loader
#
# Source order:
#   1. User's ~/.tmux.conf (if it exists) — bring your own config
#   2. jmux defaults — opinionated keybindings, colors, status bar
#   3. jmux core — required settings that jmux depends on (sourced last, wins)
#
# Users keep their entire existing tmux setup. jmux only forces the
# few settings it needs (core.conf). Everything else can be overridden.

# Step 1: User config
if-shell "test -f ~/.tmux.conf" "source-file ~/.tmux.conf"

# Step 2: jmux defaults (keybindings, colors, status bar)
source-file "$JMUX_DIR/config/defaults.conf"

# Step 3: jmux core (non-negotiable — must be last)
source-file "$JMUX_DIR/config/core.conf"
