# jmux core — required settings that jmux depends on.
# These are sourced LAST and override any user config.
# Do not edit unless you know what you're doing.

# Session lifecycle — jmux expects to switch sessions, not detach
set -g detach-on-destroy off

# Mouse — required for sidebar click handling
set -g mouse on

# Pane borders — remove tmux's toggle binding so the automatic show/hide in
# defaults.conf can't be knocked into a confusing half-state. Whether borders
# show at all is an opinion, not a jmux requirement, so it lives in
# defaults.conf where a user can override it (and the window-layout-changed
# hook it needs is deliberately NOT unset here).
set-hook -gu after-select-window
unbind P

# Window naming — ignore application-set titles, show useful names
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Status bar — disabled; jmux renders window tabs in its own toolbar
set -g status off
