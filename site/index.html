  <!-- Web fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --ac:#5eead4; --ac-deep:#06241f;
    --page:#06080b; --base:#0a0e12; --surf:#0d1318; --elev:#0f161c;
    --bd:rgba(255,255,255,.07); --bd2:rgba(255,255,255,.11);
    --ink:#e7e9ee; --ink2:#9aa0ac; --ink3:#5a606c;
    --green:#34d399; --amber:#fbbf24; --blue:#60a5fa;
  }
  html{ scroll-behavior:smooth; }
  body{ background:var(--page); color:var(--ink); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; overflow-x:hidden; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .wrap{ max-width:1180px; margin:0 auto; padding:0 32px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--ac); margin-bottom:16px; }
  h2{ font-weight:800; letter-spacing:-.03em; line-height:1.06; font-size:36px; }
  .lead{ color:var(--ink2); font-size:16px; line-height:1.62; }
  .sec{ position:relative; border-top:1px solid var(--bd); }
  .sec.surf{ background:var(--base); }
  .seclabel{ position:absolute; top:14px; left:14px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink3); letter-spacing:.1em; z-index:6; background:rgba(6,8,11,.6); padding:2px 7px; border-radius:5px; }
  .center{ text-align:center; }
  .center .lead{ max-width:54ch; margin:0 auto; }
  .glow{ position:absolute; border-radius:50%; pointer-events:none; filter:blur(80px); z-index:0; }
  .kbd{ font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--surf); border:1px solid var(--bd2); border-radius:6px; padding:2px 7px; color:var(--ink); white-space:nowrap; }
  a{ color:inherit; text-decoration:none; }

  /* NAV */
  nav{ position:sticky; top:0; z-index:40; backdrop-filter:blur(14px); background:rgba(6,8,11,.72); border-bottom:1px solid var(--bd); }
  nav .row{ display:flex; align-items:center; justify-content:space-between; height:62px; }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:-.01em; font-size:18px; }
  .brand .v{ font-size:10px; color:var(--ac); background:rgba(94,234,212,.1); padding:2px 7px; border-radius:5px; font-family:'JetBrains Mono'; }
  .navlinks{ display:flex; align-items:center; gap:26px; color:var(--ink2); font-size:14px; }
  .navlinks a:hover{ color:var(--ink); }
  .btn{ background:var(--ac); color:var(--ac-deep); padding:8px 16px; border-radius:9px; font-weight:600; font-size:13.5px; display:inline-block; }
  .btn.ghost{ background:transparent; color:var(--ink); border:1px solid var(--bd2); }

  /* HERO */
  .hero{ position:relative; padding:90px 0 76px; }
  .hero .glow{ width:700px; height:700px; top:-200px; right:-180px; background:radial-gradient(circle,rgba(94,234,212,.16),transparent 62%); }
  .hero .grid{ position:relative; z-index:2; display:grid; grid-template-columns:.92fr 1.08fr; gap:34px; align-items:center; }
  .hero h1{ font-weight:900; letter-spacing:-.045em; line-height:1.0; font-size:56px; margin-bottom:24px; }
  .hero h1 .m{ opacity:.42; }
  .hero .lead{ font-size:17px; max-width:42ch; margin-bottom:30px; }
  .pill{ display:inline-flex; align-items:center; gap:11px; padding:13px 18px; border-radius:12px; background:var(--surf); border:1px solid var(--bd2); font-family:'JetBrains Mono',monospace; font-size:14px; color:#cfe9e4; }
  .pill .d{ color:var(--ac); font-weight:700; }
  .pill .cp{ margin-left:6px; color:var(--ink3); cursor:pointer; }
  .proof{ display:flex; align-items:center; gap:14px; margin-top:30px; color:var(--ink3); font-size:13px; }
  .avs{ display:flex; } .avs span{ width:32px; height:32px; border-radius:50%; border:2px solid var(--page); background:#1c2530; margin-left:-9px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--ac); }
  .avs span:first-child{ margin-left:0; }
  .stars{ color:var(--ac); letter-spacing:1px; }
  .heroshot{ position:relative; }
  .heroshot img{ width:128%; max-width:128%; border-radius:14px 0 0 14px; border:1px solid var(--bd2); border-right:0; box-shadow:0 40px 100px rgba(0,0,0,.65); display:block; }

  /* THESIS / DIAGRAM */
  .thesis{ padding:100px 0; }
  .thesis .glow{ width:600px; height:600px; top:18%; left:50%; transform:translateX(-50%); background:radial-gradient(circle,rgba(94,234,212,.08),transparent 65%); }
  .diagram{ position:relative; z-index:2; max-width:780px; height:460px; margin:54px auto 0; }
  .diagram svg{ position:absolute; inset:0; width:100%; height:100%; }
  .node{ position:absolute; transform:translate(-50%,-50%); background:var(--surf); border:1px solid var(--bd2); border-radius:12px; padding:11px 16px; font-family:'JetBrains Mono',monospace; font-size:13px; white-space:nowrap; z-index:2; box-shadow:0 8px 24px rgba(0,0,0,.4); text-align:center; }
  .node small{ display:block; font-family:'Inter'; font-size:10.5px; color:var(--ink3); margin-top:3px; }
  .hub{ background:linear-gradient(180deg,#0f2722,#0b1a17); border-color:rgba(94,234,212,.5); box-shadow:0 0 0 1px rgba(94,234,212,.3),0 0 50px rgba(94,234,212,.25); padding:16px 28px; }
  .hub b{ color:var(--ac); font-size:21px; font-weight:700; }

  /* BENTO */
  .bento{ display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:188px; gap:16px; margin-top:50px; }
  .tile{ background:var(--surf); border:1px solid var(--bd); border-radius:18px; padding:24px; position:relative; overflow:hidden; transition:border-color .25s, transform .25s; }
  .tile:hover{ border-color:rgba(94,234,212,.35); transform:translateY(-3px); }
  .tile h3{ font-size:17px; font-weight:700; margin-bottom:8px; }
  .tile p{ color:var(--ink2); font-size:13.5px; line-height:1.55; }
  .tile .ico{ width:38px; height:38px; border-radius:10px; background:rgba(94,234,212,.1); display:flex; align-items:center; justify-content:center; color:var(--ac); margin-bottom:14px; font-family:'JetBrains Mono'; font-weight:700; font-size:16px; }
  .tile.big{ grid-column:span 2; grid-row:span 2; padding:30px; }
  .tile.big img{ position:absolute; right:-26px; bottom:-22px; width:60%; border-radius:12px 0 0 0; border:1px solid var(--bd2); border-right:0; border-bottom:0; box-shadow:-20px -20px 60px rgba(0,0,0,.5); }
  .tile.wide{ grid-column:span 2; }
  .states{ display:flex; gap:16px; margin-top:6px; }
  .states .st{ display:flex; align-items:center; gap:7px; font-family:'JetBrains Mono'; font-size:12px; color:var(--ink2); }
  .states .g{ font-size:14px; font-weight:700; }

  /* SHOWCASE */
  .showcase{ padding:96px 0; }
  .showrow{ display:grid; grid-template-columns:1fr 1.18fr; gap:56px; align-items:center; }
  .showrow + .showrow{ margin-top:90px; }
  .showrow.flip{ grid-template-columns:1.18fr 1fr; }
  .showrow.flip .txt{ order:2; }
  .showrow img{ width:100%; border-radius:13px; border:1px solid var(--bd2); box-shadow:0 30px 80px rgba(0,0,0,.6); display:block; }
  .showrow img + img{ margin-top:14px; }
  .showrow h2{ font-size:30px; margin-bottom:16px; }
  .showrow .lead{ font-size:15.5px; margin-bottom:14px; }

  /* TESTIMONIALS */
  .tst{ padding:80px 0; }
  .tgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:40px; }
  .tcard{ background:var(--surf); border:1px solid var(--bd); border-radius:16px; padding:22px; }
  .tcard p{ color:var(--ink); font-size:14.5px; line-height:1.6; margin-bottom:16px; }
  .tcard .who{ display:flex; align-items:center; gap:10px; }
  .tcard .av{ width:34px; height:34px; border-radius:50%; background:#1c2530; color:var(--ac); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; overflow:hidden; }
  .tcard .av img{ width:100%; height:100%; object-fit:cover; }
  .tcard .nm{ font-weight:600; font-size:14px; }
  .tcard .hd{ color:var(--ink3); font-size:12px; }

  /* COMPARISON */
  .cmp{ padding:96px 0; }
  .ctable{ max-width:900px; margin:46px auto 0; border:1px solid var(--bd); border-radius:18px; overflow:hidden; background:var(--surf); }
  .ctable table{ width:100%; border-collapse:collapse; font-size:14px; }
  .ctable th,.ctable td{ padding:14px 18px; text-align:center; border-bottom:1px solid var(--bd); }
  .ctable tr:last-child td{ border-bottom:0; }
  .ctable th:first-child,.ctable td:first-child{ text-align:left; color:var(--ink2); width:40%; }
  .ctable thead th{ color:var(--ink3); font-weight:500; }
  .ctable .jcol{ background:rgba(94,234,212,.06); color:var(--ac); font-weight:600; }
  .ctable thead .jcol{ color:var(--ac); font-weight:700; }
  .yes{ color:var(--ac); } .no{ color:var(--ink3); } .meh{ color:var(--ink3); font-size:12.5px; }
  .cmp .foot{ text-align:center; color:var(--ink3); font-size:12.5px; margin-top:18px; }

  /* CLI band */
  .cliband{ padding:96px 0; }
  .term{ max-width:920px; margin:46px auto 0; background:#070b0e; border:1px solid var(--bd2); border-radius:14px; overflow:hidden; box-shadow:0 40px 90px rgba(0,0,0,.6); text-align:left; }
  .term .bar{ display:flex; align-items:center; gap:7px; padding:11px 15px; border-bottom:1px solid var(--bd); }
  .term .bar .d{ width:11px; height:11px; border-radius:50%; }
  .term .bar small{ margin-left:8px; color:var(--ink3); font-family:'JetBrains Mono'; font-size:11px; }
  .term .body{ padding:22px 24px; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.9; }
  .term .c{ color:var(--ink3); } .term .w{ color:#cdd2db; } .term .a{ color:var(--ac); } .term .am{ color:var(--amber); }
  .term .o{ color:#8a93a0; }

  /* ECOSYSTEM */
  .eco{ padding:96px 0; }
  .ecogrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:46px; text-align:left; }
  .ecocard{ background:var(--surf); border:1px solid var(--bd); border-radius:14px; padding:20px; transition:border-color .25s, transform .25s; }
  .ecocard:hover{ border-color:rgba(94,234,212,.35); transform:translateY(-3px); }
  .ecocard .nm{ font-family:'JetBrains Mono'; font-weight:700; font-size:16px; margin-bottom:5px; }
  .ecocard .tg{ color:var(--ink3); font-size:11.5px; margin-bottom:8px; }
  .ecocard p{ color:var(--ink2); font-size:12px; line-height:1.5; }
  .ecocard.dashed{ border-style:dashed; } .ecocard.dashed .nm{ color:var(--ac); }
  .ecocard .new{ font-size:9px; color:var(--ac); background:rgba(94,234,212,.12); padding:1px 6px; border-radius:4px; margin-left:7px; vertical-align:middle; letter-spacing:.05em; }

  /* CTA */
  .cta{ padding:120px 0; text-align:center; position:relative; }
  .cta .glow{ width:720px; height:520px; top:0; left:50%; transform:translateX(-50%); background:radial-gradient(circle,rgba(94,234,212,.14),transparent 60%); }
  .cta h2{ font-size:48px; font-weight:900; letter-spacing:-.045em; position:relative; z-index:2; }
  .cta .sub{ color:var(--ink3); margin:14px 0 34px; position:relative; z-index:2; font-size:14px; }
  .cmd{ position:relative; z-index:2; max-width:430px; margin:0 auto; background:var(--surf); border:1px solid var(--bd2); border-radius:14px; padding:22px 24px; text-align:left; font-family:'JetBrains Mono'; font-size:14px; }
  .cmd div{ margin:6px 0; } .cmd .d{ color:var(--ac); }
  .cta .note{ color:var(--ink3); font-size:12.5px; margin-top:20px; position:relative; z-index:2; }

  /* FOOTER */
  footer{ border-top:1px solid var(--bd); padding:30px 0; }
  footer .row{ display:flex; align-items:center; justify-content:space-between; color:var(--ink3); font-size:13px; }
  footer .links{ display:flex; gap:22px; } footer .links a:hover{ color:var(--ink); }

  @media (max-width:880px){
    .hero .grid,.showrow,.showrow.flip{ grid-template-columns:1fr; }
    .showrow.flip .txt{ order:0; }
    .bento{ grid-template-columns:1fr; grid-auto-rows:auto; } .tile.big,.tile.wide{ grid-column:span 1; grid-row:auto; }
    .ecogrid,.tgrid{ grid-template-columns:1fr; } .heroshot img{ width:100%; border-radius:14px; border-right:1px solid var(--bd2); }
    .hero h1{ font-size:40px; } .cta h2{ font-size:34px; }
  }
  </style>
</head>
